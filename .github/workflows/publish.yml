---
name: Publish Release

on:
  push:
    tags:
      - 'v*'

env:
  IMAGE_NAME: dewpoint

jobs:
  # NOTE: Publishing to crates.io is disabled because the crate name "dewpoint"
  # is already registered by another author (an unrelated 2018 weather crate,
  # https://crates.io/crates/dewpoint). crates.io does not release taken names,
  # even when all versions are yanked, so `cargo publish` would fail with a
  # "not an owner" error. To enable crates.io publishing, rename the published
  # package to an available name (keeping the binary as "dewpoint" via a [[bin]]
  # entry in Cargo.toml), add a CARGO_REGISTRY_TOKEN secret, then uncomment this
  # job.
  #
  # publish-crate:
  #   name: Publish to Crates.io
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v6
  #
  #     - name: Install system dependencies
  #       run: sudo apt-get update && sudo apt-get install -y pkg-config libdbus-1-dev
  #
  #     - name: Set up Rust toolchain
  #       run: rustup show
  #
  #     - name: Cache dependencies
  #       uses: swatinem/rust-cache@v2
  #
  #     - name: Cargo Publish
  #       env:
  #         CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
  #       run: cargo publish

  publish-docker:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Log into GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish-deb:
    name: Build .deb package
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libdbus-1-dev

      - name: Set up Rust toolchain
        run: rustup show

      - name: Cache dependencies
        uses: swatinem/rust-cache@v2

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build .deb package
        run: cargo deb --target ${{ matrix.target }}

      - name: Attach .deb to release
        uses: softprops/action-gh-release@v3
        with:
          files: target/${{ matrix.target }}/debian/*.deb

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
